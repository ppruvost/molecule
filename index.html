<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Molécules 3D Studio</title>

    <!-- 3Dmol -->
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="panel">
    <h2>Molécules 3D Studio</h2>

    <!-- 📦 LIBRAIRIE -->
    <select id="molSelect"></select>

    <button id="btnGen">Générer</button>
    <button id="btnExample">Exemple</button>

    <hr>

    <!-- 🔬 SMILES -->
    <input type="text" id="smilesInput" placeholder="Ex: CCO (éthanol)">
    <button id="btnSmiles">Générer depuis SMILES</button>

    <hr>

    <input type="file" id="fileInput" />

    <p id="status"></p>
</div>

<div id="viewer"></div>

<script type="module" src="script.js"></script>

</body>
</html>
