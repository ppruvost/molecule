<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Molécules 3D</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://3dmol.org/build/3Dmol-min.js"></script>
</head>
<body>

<h1>Visualiseur moléculaire 3D</h1>

<input type="text" id="search" placeholder="Ex : glucose, ethanol, caffeine">
<button onclick="searchMolecule()">Rechercher</button>

<div id="info">
  <p><strong>Formule :</strong> <span id="formule">-</span></p>
  <p><strong>Masse :</strong> <span id="masse">-</span> g/mol</p>
</div>

<div id="viewer-container">
  <div id="viewer"></div>
</div>

<script src="script.js"></script>

</body>
</html>
