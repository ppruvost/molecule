<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Visualiseur Molécules 3D</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
</head>
<body>

<h1>🔬 Visualiseur molécules 3D (PubChem)</h1>

<select id="moleculeSelect"></select>

<input type="text" id="smilesInput" placeholder="Entrer un SMILES">
<button onclick="loadFromSmiles()">Afficher SMILES</button>

<div id="info">
  <p><strong>Formule :</strong> <span id="formula"></span></p>
  <p><strong>Masse molaire :</strong> <span id="mass"></span> g/mol</p>
  <div id="viewer"></div>
</div>

<script src="app.js"></script>
</body>
</html>
